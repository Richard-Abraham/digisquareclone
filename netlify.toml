# Netlify build + cache configuration for this Next.js app.

[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Never cache HTML documents, so a new deploy shows up on a normal refresh
# instead of serving a stale page from the browser/CDN cache.
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Next.js fingerprints these filenames, so they're safe to cache forever.
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
